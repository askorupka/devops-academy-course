name: CI (test)

on: [push]
  # push:
  #   branches:
  #     - main
  # pull_request:
  #   branches:
  #     - main

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 01-ci-lab

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test
        run: pytest 

      - name: Run linter
        run: flake8 .    
  
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 01-ci-lab

    permissions:
      id-token: write

    needs: test

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::350469506175:role/github-actions-lambda-deploy-role
          aws-region: eu-central-1
          
      - name: Prepare Lambda package
        run: |
          cp app/calculator.py lambda_function.py
          zip function.zip lambda_function.py

      - name: Create Lambda
        run: |
          aws lambda create-function \
            --function-name calculator-app \
            --role arn:aws:iam::350469506175:role/service-role/calculator-app-role-cnpkrehb \
            --runtime python3.13 \
            --zip-file fileb://function.zip

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name calculator-app \
            --zip-file fileb://function.zip